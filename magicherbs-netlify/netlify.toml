[build]
  publish = "public"
  functions = "netlify/functions"
  command = "npm install"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@libsql/client"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# SPA-фолбэк не нужен — это одностраничное приложение с единственным index.html,
# Netlify отдаёт его по умолчанию для "/".
